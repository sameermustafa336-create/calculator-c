<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حساب الإعفاء الشامل - العراق</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; max-width: 800px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid #005a2b; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 100px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #005a2b; color: white; }
        input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .btn-calc { display: block; width: 100%; padding: 15px; background: #005a2b; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-calc:hover { background: #00401f; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.8; }
        .status-pass { color: green; font-weight: bold; }
        .status-fail { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Seal_of_the_Ministry_of_Education_of_Iraq.svg/512px-Seal_of_the_Ministry_of_Education_of_Iraq.svg.png" class="logo">
        <h2>جمهورية العراق - وزارة التربية</h2>
        <h3>حاسبة السعي السنوي والإعفاء الفردي</h3>
    </div>

    <table>
        <thead>
            <tr>
                <th>المادة</th>
                <th>الفصل 1</th>
                <th>نصف السنة</th>
                <th>الفصل 2</th>
                <th>السعي</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="subjectsTable">
            </tbody>
    </table>

    <button class="btn-calc" onclick="calculateAll()">احسب السعي والنتائج</button>

    <div id="finalResult" class="result-box"></div>
</div>

<script>
    const subjects = ["الرياضيات", "الانجليزي", "الفيزياء", "الإسلامية", "الأحياء", "الكيمياء", "الحاسوب", "العربي"];
    const tableBody = document.getElementById('subjectsTable');

    // توليد الصفوف للمواد
    subjects.forEach((sub, index) => {
        tableBody.innerHTML += `
            <tr>
                <td><strong>${sub}</strong></td>
                <td><input type="number" id="f1_${index}" min="0" max="100"></td>
                <td><input type="number" id="mid_${index}" min="0" max="100"></td>
                <td><input type="number" id="f2_${index}" min="0" max="100"></td>
                <td id="saye_${index}">-</td>
                <td id="status_${index}">-</td>
            </tr>
        `;
    });

    function calculateAll() {
        let totalSaye = 0;
        let count = subjects.length;

        subjects.forEach((sub, index) => {
            let f1 = parseFloat(document.getElementById(`f1_${index}`).value) || 0;
            let mid = parseFloat(document.getElementById(`mid_${index}`).value) || 0;
            let f2 = parseFloat(document.getElementById(`f2_${index}`).value) || 0;

            // حساب السعي السنوي (مجموعهم تقسيم 3)
            let saye = Math.round((f1 + mid + f2) / 3);
            totalSaye += saye;

            document.getElementById(`saye_${index}`).innerText = saye;

            let statusTd = document.getElementById(`status_${index}`);
            if (saye >= 90) {
                statusTd.innerHTML = '<span class="status-pass">معفى فردي</span>';
            } else {
                statusTd.innerHTML = '<span class="status-fail">غير معفى</span>';
            }
        });

        let average = (totalSaye / count).toFixed(2);
        let finalBox = document.getElementById('finalResult');
        finalBox.style.display = "block";
        finalBox.style.backgroundColor = "#e8f5e9";
        
        let generalExemption = (average >= 85) ? "مؤهل للإعفاء العام (بشرط لا توجد درجة أقل من 75)" : "غير مؤهل للإعفاء العام";
        
        finalBox.innerHTML = `
            <strong>المعدل السنوي العام: ${average}</strong><br>
            الحالة: ${generalExemption}
        `;
    }
</script>

</body>
</html>
