<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>صور طبيعة 4K</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}

h1 {
    padding: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🌍 مناظر طبيعية 4K</h1>

<div class="gallery">

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
</div>

</body>
